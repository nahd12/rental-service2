<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | АрендаНаРаз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 28px;
            color: #333;
        }
        .logo span {
            color: #667eea;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
        }
        .demo {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 12px;
            text-align: center;
        }
        .demo p {
            color: #666;
            margin-bottom: 8px;
        }
        .demo code {
            background: #e0e0e0;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 14px;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .success { background: #10b981; }
        .error { background: #ef4444; }
        .info { background: #3b82f6; }
        .home-link {
            text-align: center;
            margin-top: 20px;
        }
        .home-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>One<span>Time</span></h1>
                <p style="color: #666; margin-top: 5px;">Аренда вещей на один раз</p>
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>
            
            <!-- Форма входа -->
            <div class="form active" id="loginForm">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit">Войти</button>
                </form>
                <div class="demo">
                    <p>📌 Тестовый аккаунт:</p>
                    <code>demo@example.com</code> / <code>123456</code>
                </div>
            </div>
            
            <!-- Форма регистрации -->
            <div class="form" id="registerForm">
                <form id="registerFormElement">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regName" placeholder="Иван Иванов" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Телефон</label>
                        <input type="tel" id="regPhone" placeholder="+7 900 123-45-67">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Подтвердите пароль</label>
                        <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit">Зарегистрироваться</button>
                </form>
            </div>
            
            <div class="home-link">
                <a href="index.html">← На главную</a>
            </div>
        </div>
    </div>

    <script>
        // Функция показа уведомлений
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // Инициализация данных
        function initUsers() {
            let users = localStorage.getItem('users');
            if (!users) {
                const defaultUsers = [
                    {
                        id: '1',
                        name: 'Демо Пользователь',
                        email: 'demo@example.com',
                        password: '123456',
                        phone: '+7 900 123-45-67',
                        address: '',
                        rating: null,
                        createdAt: new Date().toISOString()
                    }
                ];
                localStorage.setItem('users', JSON.stringify(defaultUsers));
            }
        }
        
        // Регистрация
        function registerUser(name, email, phone, password) {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            
            if (users.find(u => u.email === email)) {
                showNotification('Пользователь с таким email уже существует', 'error');
                return false;
            }
            
            const newUser = {
                id: Date.now().toString(),
                name: name,
                email: email,
                password: password,
                phone: phone || '',
                address: '',
                rating: null,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            
            showNotification('Регистрация успешна!', 'success');
            return true;
        }
        
        // Вход
        function loginUser(email, password) {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                showNotification('Вход выполнен!', 'success');
                return true;
            } else {
                showNotification('Неверный email или пароль', 'error');
                return false;
            }
        }
        
        // Переключение табов
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });
        
        // Обработчик входа
        const loginForm = document.getElementById('loginFormElement');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log('🔵 Попытка входа...');
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            console.log('Email:', email);
            
            if (loginUser(email, password)) {
                console.log('✅ Вход успешен, перенаправление...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        });
        
        // Обработчик регистрации
        const registerFormElement = document.getElementById('registerFormElement');
        registerFormElement.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log('🔵 Попытка регистрации...');
            
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!name || !email || !password) {
                showNotification('Заполните все обязательные поля', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showNotification('Пароли не совпадают', 'error');
                return;
            }
            
            if (password.length < 4) {
                showNotification('Пароль должен быть минимум 4 символа', 'error');
                return;
            }
            
            if (registerUser(name, email, phone, password)) {
                console.log('✅ Регистрация успешна, перенаправление...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }
        });
        
        // Инициализация
        initUsers();
        console.log('🔵 Страница входа загружена');
        console.log('📊 Существующие пользователи:', JSON.parse(localStorage.getItem('users') || '[]').length);
    </script>
</body>
</html>
