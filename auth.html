<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | OneTime</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt"></i>
                <span>One<span class="accent">Time</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="create-listing.html">Сдать вещь</a>
                <a href="bookings.html">Мои бронирования</a>
            </div>
            <div class="nav-user">
                <a href="login.html" class="btn btn-outline" id="loginBtn">Войти</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="auth-section">
            <div class="container">
                <div class="auth-card">
                    <div class="auth-tabs">
                        <button class="auth-tab active" data-auth="login">Вход</button>
                        <button class="auth-tab" data-auth="register">Регистрация</button>
                    </div>

                    <div class="auth-form active" id="loginForm">
                        <h2>Добро пожаловать!</h2>
                        <p>Войдите в свой аккаунт</p>
                        <form id="loginFormElement">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="loginEmail" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Пароль</label>
                                <input type="password" id="loginPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">Войти</button>
                        </form>
                        <div class="demo-credentials">
                            <p>Тестовый аккаунт:</p>
                            <code>demo@example.com / 123456</code>
                        </div>
                    </div>

                    <div class="auth-form" id="registerForm">
                        <h2>Создать аккаунт</h2>
                        <p>Присоединяйтесь к сообществу</p>
                        <form id="registerFormElement">
                            <div class="form-group">
                                <label>Имя *</label>
                                <input type="text" id="regName" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" id="regEmail" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Телефон</label>
                                <input type="tel" id="regPhone" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Пароль *</label>
                                <input type="password" id="regPassword" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Подтвердите пароль *</label>
                                <input type="password" id="regConfirmPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">Зарегистрироваться</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <i class="fas fa-exchange-alt"></i>
                        <span>One<span class="accent">Time</span></span>
                    </a>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2025 OneTime. Все права защищены.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        (function() {
            console.log('🔵 auth.html загружен');
            
            function showNotification(message, type) {
                const notification = document.createElement('div');
                notification.textContent = message;
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 12px 24px;
                    border-radius: 12px;
                    background: ${type === 'success' ? '#10b981' : '#ef4444'};
                    color: white;
                    z-index: 1000;
                    font-weight: 500;
                    z-index: 10000;
                `;
                document.body.appendChild(notification);
                setTimeout(() => notification.remove(), 2000);
            }
            
            // Функция перенаправления с принудительной перезагрузкой
            function redirectToHome() {
                console.log('🔄 Перенаправление на главную...');
                window.location.href = 'index.html';
            }
            
            // ========== РЕГИСТРАЦИЯ ==========
            const registerForm = document.getElementById('registerFormElement');
            if (registerForm) {
                console.log('✅ Форма регистрации найдена');
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('🔵 Отправка регистрации');
                    
                    const name = document.getElementById('regName').value.trim();
                    const email = document.getElementById('regEmail').value.trim();
                    const phone = document.getElementById('regPhone').value.trim();
                    const password = document.getElementById('regPassword').value;
                    const confirmPassword = document.getElementById('regConfirmPassword').value;
                    
                    if (!name || !email || !password) {
                        showNotification('Заполните все обязательные поля', 'error');
                        return;
                    }
                    
                    if (password !== confirmPassword) {
                        showNotification('Пароли не совпадают', 'error');
                        return;
                    }
                    
                    if (password.length < 4) {
                        showNotification('Пароль должен быть минимум 4 символа', 'error');
                        return;
                    }
                    
                    let users = JSON.parse(localStorage.getItem('users')) || [];
                    
                    if (users.find(u => u.email === email)) {
                        showNotification('Пользователь уже существует', 'error');
                        return;
                    }
                    
                    const newUser = {
                        id: Date.now().toString(),
                        name: name,
                        email: email,
                        password: password,
                        phone: phone || '',
                        address: '',
                        rating: null,
                        createdAt: new Date().toISOString()
                    };
                    
                    users.push(newUser);
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(newUser));
                    
                    console.log('✅ Пользователь сохранен:', newUser);
                    console.log('📦 currentUser в localStorage:', localStorage.getItem('currentUser'));
                    
                    showNotification('Регистрация успешна!', 'success');
                    setTimeout(redirectToHome, 1500);
                });
            }
            
            // ========== ВХОД ==========
            const loginForm = document.getElementById('loginFormElement');
            if (loginForm) {
                console.log('✅ Форма входа найдена');
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('🔵 Отправка входа');
                    
                    const email = document.getElementById('loginEmail').value.trim();
                    const password = document.getElementById('loginPassword').value;
                    
                    console.log('📧 Email:', email);
                    
                    const users = JSON.parse(localStorage.getItem('users')) || [];
                    console.log('👥 Всего пользователей:', users.length);
                    
                    const user = users.find(u => u.email === email && u.password === password);
                    
                    if (user) {
                        console.log('✅ Пользователь найден:', user);
                        localStorage.setItem('currentUser', JSON.stringify(user));
                        console.log('📦 currentUser сохранен:', localStorage.getItem('currentUser'));
                        
                        showNotification('Вход выполнен!', 'success');
                        
                        // Принудительное перенаправление
                        setTimeout(function() {
                            console.log('🔄 Перенаправление на главную...');
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        console.log('❌ Пользователь не найден');
                        showNotification('Неверный email или пароль', 'error');
                    }
                });
            }
            
            // Переключение табов
            const tabs = document.querySelectorAll('.auth-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                    document.getElementById(tab.dataset.auth + 'Form').classList.add('active');
                });
            });
            
            // Проверка: если уже залогинены, перенаправляем на главную
            const alreadyLoggedIn = localStorage.getItem('currentUser');
            if (alreadyLoggedIn) {
                console.log('👤 Пользователь уже залогинен, перенаправление...');
                window.location.href = 'index.html';
            }
        })();
    </script>
</body>
</html>
