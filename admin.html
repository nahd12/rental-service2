<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Аренда на раз</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            padding: 48px 0;
        }
        .users-table {
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }
        .users-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .users-table th, .users-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .users-table th {
            background: var(--gray);
            color: var(--primary);
        }
        .export-btn {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            border: none;
            cursor: pointer;
        }
        .access-denied {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
        }
        .access-denied i {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: 20px;
        }
        .access-denied h2 {
            margin-bottom: 16px;
        }
        .access-denied p {
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt"></i>
                <span>Аренда<span class="accent">НаРаз</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="create-listing.html">Сдать вещь</a>
                <a href="bookings.html">Мои бронирования</a>
            </div>
            <div class="nav-user" id="navUser"></div>
        </nav>
    </header>

    <main>
        <div class="container admin-container" id="adminContent">
            <div style="text-align: center; padding: 48px;">
                <i class="fas fa-spinner fa-spin"></i> Проверка прав доступа...
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <i class="fas fa-exchange-alt"></i>
                        <span>Аренда<span class="accent">НаРаз</span></span>
                    </a>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2025 АрендаНаРаз. Все права защищены.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // ============================================
        // АДМИН-ПАНЕЛЬ - ТОЛЬКО ДЛЯ АДМИНИСТРАТОРА
        // ============================================
        
        // EMAIL АДМИНИСТРАТОРА (ИЗМЕНИТЕ НА СВОЙ!)
        const ADMIN_EMAIL = 'admin@arenanaraz.ru';
        
        function checkAdminAccess() {
            // Получаем текущего пользователя из localStorage
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                // Пользователь не авторизован
                showAccessDenied('Войдите в аккаунт');
                return false;
            }
            
            if (currentUser.email !== ADMIN_EMAIL) {
                // Пользователь не является администратором
                showAccessDenied('У вас нет доступа к админ-панели');
                return false;
            }
            
            return true;
        }
        
        function showAccessDenied(message) {
            const container = document.getElementById('adminContent');
            container.innerHTML = `
                <div class="access-denied">
                    <i class="fas fa-lock"></i>
                    <h2>⛔ Доступ запрещен</h2>
                    <p>${message}</p>
                    <p style="margin-top: 20px;">
                        <a href="auth.html" class="btn btn-primary">Войти как администратор</a>
                        <a href="index.html" class="btn btn-outline">Вернуться на главную</a>
                    </p>
                </div>
            `;
        }
        
        function loadUsers() {
            const usersData = localStorage.getItem('users');
            if (usersData) {
                const users = JSON.parse(usersData);
                displayUsers(users);
            } else {
                document.getElementById('usersTable').innerHTML = '<div style="text-align:center; padding:48px;">Нет зарегистрированных пользователей</div>';
            }
        }
        
        function displayUsers(users) {
            document.getElementById('totalCount').textContent = users.length;
            
            if (users.length === 0) {
                document.getElementById('usersTable').innerHTML = '<div style="text-align:center; padding:48px;">Нет пользователей</div>';
                return;
            }
            
            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Email</th>
                            <th>Телефон</th>
                            <th>Дата регистрации</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.name} ${user.email === ADMIN_EMAIL ? '<span style="color:var(--primary);">👑 Админ</span>' : ''}</td>
                                <td>${user.email}</td>
                                <td>${user.phone || '-'}</td>
                                <td>${user.createdAt ? new Date(user.createdAt).toLocaleString('ru-RU') : '-'}</td>
                                <td>
                                    ${user.email !== ADMIN_EMAIL ? `
                                        <button onclick="deleteUser('${user.id}')" style="background:var(--danger); color:white; border:none; padding:4px 12px; border-radius:8px; cursor:pointer;">
                                            <i class="fas fa-trash"></i> Удалить
                                        </button>
                                    ` : '<span style="color:var(--primary);">Администратор</span>'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('usersTable').innerHTML = table;
        }
        
        function deleteUser(userId) {
            if (confirm('Удалить этого пользователя?')) {
                const usersData = localStorage.getItem('users');
                let users = JSON.parse(usersData);
                users = users.filter(u => u.id !== userId);
                localStorage.setItem('users', JSON.stringify(users));
                
                // Если удалили текущего пользователя, выходим
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                if (currentUser && currentUser.id === userId) {
                    localStorage.removeItem('currentUser');
                    showNotification('Ваш аккаунт был удален', 'error');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
                
                loadUsers();
                document.getElementById('totalCount').textContent = users.length;
                showNotification('Пользователь удален', 'success');
            }
        }
        
        function exportToCSV() {
            const usersData = localStorage.getItem('users');
            if (!usersData) return;
            
            const users = JSON.parse(usersData);
            const headers = ['ID', 'Имя', 'Email', 'Телефон', 'Дата регистрации'];
            const rows = users.map(user => [
                user.id,
                user.name,
                user.email,
                user.phone || '',
                user.createdAt ? new Date(user.createdAt).toLocaleString('ru-RU') : ''
            ]);
            
            const csvContent = [headers, ...rows]
                .map(row => row.map(cell => `"${cell}"`).join(','))
                .join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `users_${new Date().toISOString().slice(0,10)}.csv`);
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showNotification('Экспорт завершен', 'success');
        }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 24px;
                border-radius: 12px;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white;
                z-index: 1000;
                font-weight: 500;
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // Загрузка страницы
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAdminAccess()) {
                // Загружаем админ-панель
                const container = document.getElementById('adminContent');
                container.innerHTML = `
                    <h1>👑 Админ-панель</h1>
                    <p>Всего пользователей: <strong id="totalCount">0</strong></p>
                    
                    <div style="display: flex; gap: 16px; margin-bottom: 20px;">
                        <button onclick="exportToCSV()" class="export-btn">
                            <i class="fas fa-download"></i> Экспортировать в CSV
                        </button>
                        <button onclick="loadUsers()" class="export-btn" style="background: var(--gray-light);">
                            <i class="fas fa-sync-alt"></i> Обновить
                        </button>
                    </div>
                    
                    <div class="users-table" id="usersTable">
                        <div style="text-align: center; padding: 48px;">
                            <i class="fas fa-spinner fa-spin"></i> Загрузка...
                        </div>
                    </div>
                `;
                loadUsers();
            }
        });
    </script>
</body>
</html>
