<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали товара | OneTime</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-container {
            background: var(--card-bg);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 4px;
        }
        .modal-close:hover {
            color: #ef4444;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: var(--gray);
            border-radius: 3px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .edit-preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
            background: var(--gray);
        }
        .owner-actions {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .owner-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 16px;
        }
        .btn-edit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-cancel-modal {
            background: var(--gray);
            color: var(--text);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt"></i>
                <span>One<span class="accent">Time</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="create-listing.html">Сдать вещь</a>
                <a href="bookings.html">Мои бронирования</a>
            </div>
            <div class="nav-user" id="navUser">
                <a href="login.html" class="btn btn-outline" id="loginBtn">Войти</a>
                <div class="user-menu hidden" id="userMenu">
                    <img src="https://ui-avatars.com/api/?background=7c3aed&color=fff&bold=true" alt="avatar" class="avatar">
                    <span id="userName"></span>
                    <i class="fas fa-chevron-down"></i>
                    <div class="dropdown">
                        <a href="profile.html">Профиль</a>
                        <a href="bookings.html">Бронирования</a>
                        <a href="#" id="logoutBtn">Выйти</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container" id="itemDetails" style="padding: 48px 0;">
            <div style="text-align: center; padding: 60px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
                <p>Загрузка...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <i class="fas fa-exchange-alt"></i>
                        <span>One<span class="accent">Time</span></span>
                    </a>
                    <p>OneTime — сервис аренды вещей на один раз.</p>
                </div>
                <div class="footer-links">
                    <h4>Сервис</h4>
                    <a href="catalog.html">Каталог</a>
                    <a href="create-listing.html">Сдать вещь</a>
                </div>
                <div class="footer-links">
                    <h4>Контакты</h4>
                    <a href="mailto:support@onetime.ru">support@onetime.ru</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 OneTime. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <!-- Модальное окно редактирования -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Редактирование товара</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="editTitle" class="form-control">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="editCategory" class="form-control">
                        <option value="tools">Инструменты</option>
                        <option value="clothing">Одежда</option>
                        <option value="outdoor">Отдых</option>
                        <option value="electronics">Электроника</option>
                        <option value="sports">Спорт</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Цена за день (₽)</label>
                    <input type="number" id="editPrice" class="form-control">
                </div>
                <div class="form-group">
                    <label>Залог (₽)</label>
                    <input type="number" id="editDeposit" class="form-control">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="editDescription" rows="3" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label>Фото</label>
                    <input type="file" id="editImage" accept="image/*">
                    <img id="editImagePreview" class="edit-preview">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel-modal" onclick="closeModal()">Отмена</button>
                <button class="btn-save" onclick="saveEdit()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let currentItemId = null;
        let currentItem = null;

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                padding: 12px 24px;
                border-radius: 12px;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white;
                z-index: 10000;
                font-weight: 500;
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function openModal(item) {
            currentItemId = item.id;
            currentItem = item;
            
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editCategory').value = item.category;
            document.getElementById('editPrice').value = item.priceDay;
            document.getElementById('editDeposit').value = item.deposit;
            document.getElementById('editDescription').value = item.description;
            document.getElementById('editImagePreview').src = item.image;
            
            document.getElementById('editModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            document.body.style.overflow = '';
            currentItemId = null;
        }

        function saveEdit() {
            const items = JSON.parse(localStorage.getItem('items')) || [];
            const index = items.findIndex(i => i.id === currentItemId);
            
            if (index === -1) {
                showNotification('Товар не найден', 'error');
                closeModal();
                return;
            }
            
            const updatedItem = {
                ...items[index],
                title: document.getElementById('editTitle').value,
                category: document.getElementById('editCategory').value,
                priceDay: parseInt(document.getElementById('editPrice').value),
                deposit: parseInt(document.getElementById('editDeposit').value),
                description: document.getElementById('editDescription').value
            };
            
            const imageFile = document.getElementById('editImage').files[0];
            
            function saveItem(imgData) {
                if (imgData) updatedItem.image = imgData;
                items[index] = updatedItem;
                localStorage.setItem('items', JSON.stringify(items));
                showNotification('Товар обновлен', 'success');
                closeModal();
                loadItemDetails();
                if (typeof loadCatalog === 'function') loadCatalog();
            }
            
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = e => saveItem(e.target.result);
                reader.readAsDataURL(imageFile);
            } else {
                saveItem(null);
            }
        }

        function deleteCurrentItem() {
            if (!confirm('Удалить этот товар?')) return;
            
            let items = JSON.parse(localStorage.getItem('items')) || [];
            items = items.filter(i => i.id !== currentItemId);
            localStorage.setItem('items', JSON.stringify(items));
            
            showNotification('Товар удален', 'success');
            setTimeout(() => {
                window.location.href = 'catalog.html';
            }, 1000);
        }

        document.getElementById('editImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = event => {
                    document.getElementById('editImagePreview').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function loadItemDetails() {
            const container = document.getElementById('itemDetails');
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('id');
            
            const items = JSON.parse(localStorage.getItem('items')) || [];
            const item = items.find(i => i.id === itemId);
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!item) {
                container.innerHTML = '<div style="text-align: center; padding: 60px;"><h2>Товар не найден</h2><a href="catalog.html" class="btn btn-primary">Вернуться в каталог</a></div>';
                return;
            }
            
            currentItemId = item.id;
            currentItem = item;
            const isOwner = currentUser && item.ownerId === currentUser.id;
            
            if (isOwner) {
                container.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 48px;">
                        <div>
                            <img src="${item.image}" style="width: 100%; border-radius: 24px;">
                        </div>
                        <div>
                            <h1 style="font-size: 2rem; margin-bottom: 16px;">${item.title}</h1>
                            <div style="margin-bottom: 16px;">
                                <i class="fas fa-star" style="color: #f59e0b;"></i>
                                <span>${item.rating || 'Новый'}</span>
                            </div>
                            <p style="color: var(--text-muted); margin-bottom: 24px;">${item.description}</p>
                            <div style="background: var(--card-bg); padding: 24px; border-radius: 20px; margin-bottom: 24px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                    <span>Аренда на день:</span>
                                    <span style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">${item.priceDay} ₽</span>
                                </div>
                                <div style="color: var(--text-muted);">Залог: ${item.deposit} ₽</div>
                            </div>
                            <div class="owner-actions">
                                <p style="margin-bottom: 16px;">Это ваш товар</p>
                                <div class="owner-buttons">
                                    <button onclick="openModal(currentItem)" class="btn-edit">Редактировать</button>
                                    <button onclick="deleteCurrentItem()" class="btn-delete">Удалить</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 48px;">
                        <div>
                            <img src="${item.image}" style="width: 100%; border-radius: 24px;">
                        </div>
                        <div>
                            <h1 style="font-size: 2rem; margin-bottom: 16px;">${item.title}</h1>
                            <div style="margin-bottom: 16px;">
                                <i class="fas fa-star" style="color: #f59e0b;"></i>
                                <span>${item.rating || 'Новый'}</span>
                            </div>
                            <p style="color: var(--text-muted); margin-bottom: 24px;">${item.description}</p>
                            <div style="background: var(--card-bg); padding: 24px; border-radius: 20px; margin-bottom: 24px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                    <span>Аренда на день:</span>
                                    <span style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">${item.priceDay} ₽</span>
                                </div>
                                <div style="color: var(--text-muted);">Залог: ${item.deposit} ₽</div>
                            </div>
                            <div style="background: var(--card-bg); padding: 24px; border-radius: 20px;">
                                <h3 style="margin-bottom: 16px;">Забронировать</h3>
                                <div style="margin-bottom: 16px;">
                                    <label>Дата начала:</label>
                                    <input type="date" id="startDate" class="form-control">
                                </div>
                                <div style="margin-bottom: 16px;">
                                    <label>Дата окончания:</label>
                                    <input type="date" id="endDate" class="form-control">
                                </div>
                                <div id="totalPrice" style="margin-bottom: 16px;"></div>
                                <button onclick="bookItem('${item.id}')" class="btn btn-primary btn-full" style="width: 100%;">
                                    ${currentUser ? 'Забронировать' : 'Войдите, чтобы забронировать'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                const startDate = document.getElementById('startDate');
                const endDate = document.getElementById('endDate');
                const totalSpan = document.getElementById('totalPrice');
                
                if (startDate && endDate) {
                    function calculateTotal() {
                        if (startDate.value && endDate.value) {
                            const start = new Date(startDate.value);
                            const end = new Date(endDate.value);
                            const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                            if (days > 0) {
                                totalSpan.innerHTML = `<strong>Итого: ${days * item.priceDay} ₽ + залог ${item.deposit} ₽</strong>`;
                            }
                        }
                    }
                    startDate.addEventListener('change', calculateTotal);
                    endDate.addEventListener('change', calculateTotal);
                }
            }
        }

        function bookItem(itemId) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                showNotification('Войдите в аккаунт', 'error');
                window.location.href = 'login.html';
                return;
            }
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const items = JSON.parse(localStorage.getItem('items')) || [];
            const item = items.find(i => i.id === itemId);
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            
            if (!startDate || !endDate) {
                showNotification('Выберите даты', 'error');
                return;
            }
            
            const start = new Date(startDate);
            const end = new Date(endDate);
            const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            
            const newBooking = {
                id: Date.now().toString(),
                itemId: item.id,
                itemTitle: item.title,
                itemImage: item.image,
                renterId: currentUser.id,
                renterName: currentUser.name,
                ownerId: item.ownerId,
                ownerName: item.ownerName,
                startDate: startDate,
                endDate: endDate,
                days: days,
                totalPrice: days * item.priceDay,
                deposit: item.deposit,
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            
            bookings.push(newBooking);
            localStorage.setItem('bookings', JSON.stringify(bookings));
            showNotification('Заявка отправлена', 'success');
            setTimeout(() => window.location.href = 'bookings.html', 1500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const loginBtn = document.getElementById('loginBtn');
            const userMenu = document.getElementById('userMenu');
            const userNameSpan = document.getElementById('userName');
            
            if (currentUser) {
                if (loginBtn) loginBtn.classList.add('hidden');
                if (userMenu) {
                    userMenu.classList.remove('hidden');
                    if (userNameSpan) userNameSpan.textContent = currentUser.name;
                }
            }
            
            document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            });
            
            loadItemDetails();
        });
        
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('editModal').classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
