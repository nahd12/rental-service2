<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали товара | OneTime</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt"></i>
                <span>One<span class="accent">Time</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="create-listing.html">Сдать вещь</a>
                <a href="bookings.html">Мои бронирования</a>
            </div>
            <div class="nav-user" id="navUser">
                <a href="login.html" class="btn btn-outline" id="loginBtn">Войти</a>
                <div class="user-menu hidden" id="userMenu">
                    <img src="https://ui-avatars.com/api/?background=7c3aed&color=fff&bold=true" alt="avatar" class="avatar">
                    <span id="userName"></span>
                    <i class="fas fa-chevron-down"></i>
                    <div class="dropdown">
                        <a href="profile.html"><i class="fas fa-user"></i> Профиль</a>
                        <a href="bookings.html"><i class="fas fa-calendar"></i> Бронирования</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container" id="itemDetails" style="padding: 48px 0;">
            <div style="text-align: center; padding: 60px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                <p>Загрузка товара...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <i class="fas fa-exchange-alt"></i>
                        <span>One<span class="accent">Time</span></span>
                    </a>
                    <p>OneTime — сервис аренды вещей на один раз.</p>
                </div>
                <div class="footer-links">
                    <h4>Сервис</h4>
                    <a href="catalog.html">Каталог</a>
                    <a href="create-listing.html">Сдать вещь</a>
                </div>
                <div class="footer-links">
                    <h4>Контакты</h4>
                    <a href="mailto:support@onetime.ru">support@onetime.ru</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 OneTime. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Функция для загрузки деталей товара
        function loadItemDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const itemId = urlParams.get('id');
            
            console.log('ID товара:', itemId);
            
            if (!itemId) {
                document.getElementById('itemDetails').innerHTML = '<div style="text-align: center; padding: 60px;"><h2>Товар не найден</h2><a href="catalog.html" class="btn btn-primary">Вернуться в каталог</a></div>';
                return;
            }
            
            const items = JSON.parse(localStorage.getItem('items')) || [];
            const item = items.find(i => i.id === itemId);
            
            console.log('Найденный товар:', item);
            
            if (!item) {
                document.getElementById('itemDetails').innerHTML = '<div style="text-align: center; padding: 60px;"><h2>Товар не найден</h2><a href="catalog.html" class="btn btn-primary">Вернуться в каталог</a></div>';
                return;
            }
            
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            document.getElementById('itemDetails').innerHTML = `
                <div class="details-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 48px;">
                    <div class="details-image">
                        <img src="${item.image}" alt="${item.title}" style="width: 100%; border-radius: 24px; object-fit: cover;">
                    </div>
                    <div class="details-info">
                        <h1 style="font-size: 2rem; margin-bottom: 16px;">${item.title}</h1>
                        <div class="item-rating" style="margin-bottom: 16px;">
                            <i class="fas fa-star" style="color: #f59e0b;"></i>
                            <span>${item.rating || 'Новый'} (0 отзывов)</span>
                        </div>
                        <p style="color: var(--text-muted); margin-bottom: 24px;">${item.description}</p>
                        <div class="details-price" style="background: var(--card-bg); padding: 24px; border-radius: 20px; margin-bottom: 24px;">
                            <div class="price-row" style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                <span>Аренда на день:</span>
                                <span class="price" style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">${item.priceDay} ₽</span>
                            </div>
                            <div class="deposit-row" style="color: var(--text-muted);">
                                <span>Залог: ${item.deposit} ₽ (возвращается после аренды)</span>
                            </div>
                        </div>
                        <div class="booking-card" style="background: var(--card-bg); padding: 24px; border-radius: 20px;">
                            <h3 style="margin-bottom: 16px;">Забронировать</h3>
                            <div class="form-group" style="margin-bottom: 16px;">
                                <label>Дата начала:</label>
                                <input type="date" id="startDate" class="form-control" style="width: 100%; padding: 12px; background: var(--gray); border: 1px solid var(--border); border-radius: 12px; color: var(--text);">
                            </div>
                            <div class="form-group" style="margin-bottom: 16px;">
                                <label>Дата окончания:</label>
                                <input type="date" id="endDate" class="form-control" style="width: 100%; padding: 12px; background: var(--gray); border: 1px solid var(--border); border-radius: 12px; color: var(--text);">
                            </div>
                            <div id="totalPrice" class="total-price" style="margin-bottom: 16px;"></div>
                            <button onclick="bookThisItem('${item.id}')" class="btn btn-primary btn-full" style="width: 100%; padding: 14px;">
                                ${currentUser ? 'Забронировать' : 'Войдите, чтобы забронировать'}
                            </button>
                        </div>
                    </div>
                </div>
                <div class="reviews-section" style="margin-top: 48px;">
                    <h3>Отзывы</h3>
                    <p style="color: var(--text-muted);">Пока нет отзывов. Будьте первым!</p>
                </div>
            `;
            
            // Расчет стоимости
            const startDate = document.getElementById('startDate');
            const endDate = document.getElementById('endDate');
            const totalSpan = document.getElementById('totalPrice');
            
            function calculateTotal() {
                if (startDate.value && endDate.value) {
                    const start = new Date(startDate.value);
                    const end = new Date(endDate.value);
                    const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                    if (days > 0) {
                        const total = days * item.priceDay;
                        totalSpan.innerHTML = `<strong>Итого: ${total} ₽ + залог ${item.deposit} ₽</strong>`;
                    } else {
                        totalSpan.innerHTML = '<strong>Выберите корректные даты</strong>';
                    }
                }
            }
            
            if (startDate) startDate.addEventListener('change', calculateTotal);
            if (endDate) endDate.addEventListener('change', calculateTotal);
        }
        
        // Функция бронирования
        function bookThisItem(itemId) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                alert('Войдите в аккаунт');
                window.location.href = 'login.html';
                return;
            }
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!startDate || !endDate) {
                alert('Выберите даты аренды');
                return;
            }
            
            const items = JSON.parse(localStorage.getItem('items')) || [];
            const item = items.find(i => i.id === itemId);
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            
            const start = new Date(startDate);
            const end = new Date(endDate);
            const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            const totalPrice = days * item.priceDay;
            
            const newBooking = {
                id: Date.now().toString(),
                itemId: item.id,
                itemTitle: item.title,
                itemImage: item.image,
                renterId: currentUser.id,
                renterName: currentUser.name,
                ownerId: item.ownerId,
                ownerName: item.ownerName,
                startDate: startDate,
                endDate: endDate,
                days: days,
                totalPrice: totalPrice,
                deposit: item.deposit,
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            
            bookings.push(newBooking);
            localStorage.setItem('bookings', JSON.stringify(bookings));
            
            alert('Заявка на бронирование отправлена!');
            window.location.href = 'bookings.html';
        }
        
        // Запуск при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            loadItemDetails();
            
            // Обновление навигации
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const loginBtn = document.getElementById('loginBtn');
            const userMenu = document.getElementById('userMenu');
            const userNameSpan = document.getElementById('userName');
            
            if (currentUser) {
                if (loginBtn) loginBtn.classList.add('hidden');
                if (userMenu) {
                    userMenu.classList.remove('hidden');
                    if (userNameSpan) userNameSpan.textContent = currentUser.name;
                }
            }
            
            // Кнопка выхода
            document.getElementById('logoutBtn')?.addEventListener('click', function(e) {
                e.preventDefault();
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
