<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои бронирования | OneTime</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .booking-type-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        .type-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
        }
        .type-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .booking-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .booking-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-pending { background: #f59e0b; color: white; }
        .status-confirmed { background: #10b981; color: white; }
        .status-completed { background: #6b7280; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        .edit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .delete-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-confirm {
            background: #10b981;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .btn-reject {
            background: #ef4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .requests-block {
            margin-top: 16px;
            padding: 16px;
            background: var(--gray);
            border-radius: 12px;
        }
        .request-item {
            padding: 12px;
            background: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .item-info-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .item-thumb {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
        }
        .text-center { text-align: center; }
        .mt-4 { margin-top: 12px; }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt"></i>
                <span>One<span class="accent">Time</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="create-listing.html">Сдать вещь</a>
                <a href="bookings.html" class="active">Мои бронирования</a>
            </div>
            <div class="nav-user" id="navUser">
                <a href="login.html" class="btn btn-outline" id="loginBtn">Войти</a>
                <div class="user-menu hidden" id="userMenu">
                    <img src="https://ui-avatars.com/api/?background=7c3aed&color=fff&bold=true" class="avatar" style="width: 40px; height: 40px; border-radius: 50%;">
                    <span id="userName"></span>
                    <i class="fas fa-chevron-down"></i>
                    <div class="dropdown">
                        <a href="profile.html"><i class="fas fa-user"></i> Профиль</a>
                        <a href="bookings.html"><i class="fas fa-calendar"></i> Бронирования</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <h1>Мои бронирования</h1>
                <p>Управление арендой и вашими товарами</p>
            </div>
        </div>

        <section class="bookings-section">
            <div class="container">
                <div class="booking-type-tabs">
                    <button class="type-tab active" data-type="rentals">Мои заявки на помощь</button>
                    <button class="type-tab" data-type="my-items">Мои предложения помощи</button>
                </div>
                <div id="rentalsContainer"></div>
                <div id="myItemsContainer" style="display: none;"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">One<span class="accent">Time</span></a>
                    <p>OneTime — сервис аренды вещей на один раз.</p>
                </div>
                <div class="footer-links">
                    <h4>Сервис</h4>
                    <a href="catalog.html">Каталог</a>
                    <a href="create-listing.html">Сдать вещь</a>
                </div>
                <div class="footer-links">
                    <h4>Контакты</h4>
                    <a href="mailto:support@onetime.ru">support@onetime.ru</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 OneTime. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Функции для работы с бронированиями
        function formatDate(d) { if (!d) return '—'; let date = new Date(d); return isNaN(date.getTime()) ? '—' : date.toLocaleDateString('ru-RU'); }
        
        function getStatusText(s) { return { pending:'Ожидает', confirmed:'Подтверждена', completed:'Завершена', cancelled:'Отменена' }[s] || s; }
        
        function showNotification(m, t) {
            let n = document.createElement('div');
            n.textContent = m;
            n.style.cssText = `position:fixed;bottom:20px;right:20px;padding:12px 24px;border-radius:12px;background:${t==='success'?'#10b981':'#ef4444'};color:white;z-index:10000;font-weight:500;`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function updateBookingStatus(id, status) {
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let idx = bookings.findIndex(b => b.id === id);
            if (idx !== -1) { bookings[idx].status = status; localStorage.setItem('bookings', JSON.stringify(bookings)); showNotification('Статус изменен', 'success'); loadRentals(); loadMyItems(); }
        }

        function deleteItem(id) {
            if (!confirm('Удалить товар?')) return;
            let items = JSON.parse(localStorage.getItem('items')) || [];
            items = items.filter(i => i.id !== id);
            localStorage.setItem('items', JSON.stringify(items));
            showNotification('Товар удален', 'success');
            loadMyItems();
            if (typeof loadCatalog === 'function') loadCatalog();
        }

        function loadRentals() {
            let c = document.getElementById('rentalsContainer');
            if (!c) return;
            let user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { c.innerHTML = '<div class="empty-state">Войдите в аккаунт</div>'; return; }
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let my = bookings.filter(b => b.renterId === user.id);
            if (!my.length) { c.innerHTML = '<div class="empty-state">Нет активных аренд</div>'; return; }
            c.innerHTML = my.map(b => `
                <div class="booking-card">
                    <div class="item-row">
                        <div class="item-info-row">
                            <img src="${b.itemImage || ''}" class="item-thumb" onerror="this.src='https://placehold.co/70x70'">
                            <div>
                                <h4>${b.itemTitle || 'Без названия'}</h4>
                                <p>${formatDate(b.startDate)} — ${formatDate(b.endDate)} (${b.days || 1} дн.)</p>
                                <p>Сумма: ${b.totalPrice || 0} ₽ | Залог: ${b.deposit || 0} ₽</p>
                                <span class="booking-status status-${b.status}">${getStatusText(b.status)}</span>
                            </div>
                        </div>
                        <div>
                            <a href="item-details.html?id=${b.itemId}" class="edit-btn" style="text-decoration:none;">Подробнее</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadMyItems() {
            let c = document.getElementById('myItemsContainer');
            if (!c) return;
            let user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { c.innerHTML = '<div class="empty-state">Войдите в аккаунт</div>'; return; }
            let items = JSON.parse(localStorage.getItem('items')) || [];
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let my = items.filter(i => i.ownerId === user.id);
            if (!my.length) { c.innerHTML = '<div class="empty-state">У вас пока нет товаров.<br><a href="create-listing.html" class="btn btn-primary" style="margin-top:12px;">Создать объявление</a></div>'; return; }
            
            c.innerHTML = my.map(item => {
                let reqs = bookings.filter(b => b.itemId === item.id);
                return `
                    <div class="booking-card">
                        <div class="item-row">
                            <div class="item-info-row">
                                <img src="${item.image || ''}" class="item-thumb" onerror="this.src='https://placehold.co/70x70'">
                                <div>
                                    <h4>${item.title || 'Без названия'}</h4>
                                    <p>${item.priceDay || 0} ₽/день | Залог: ${item.deposit || 0} ₽</p>
                                    <p class="text-muted">${(item.description || '').substring(0, 80)}...</p>
                                </div>
                            </div>
                            <div>
                                <button onclick="location.href='edit-item.html?id=${item.id}'" class="edit-btn">Редактировать</button>
                                <button onclick="deleteItem('${item.id}')" class="delete-btn">Удалить</button>
                            </div>
                        </div>
                        ${reqs.length ? `
                            <div class="requests-block">
                                <strong>Запросы на аренду (${reqs.length})</strong>
                                ${reqs.map(r => `
                                    <div class="request-item">
                                        <strong>${r.renterName || 'Пользователь'}</strong> ${formatDate(r.startDate)} — ${formatDate(r.endDate)}<br>
                                        Сумма: ${r.totalPrice || 0} ₽<br>
                                        <span class="booking-status status-${r.status}">${getStatusText(r.status)}</span>
                                        ${r.status === 'pending' ? `
                                            <div class="mt-4">
                                                <button onclick="updateBookingStatus('${r.id}','confirmed')" class="btn-confirm">Подтвердить</button>
                                                <button onclick="updateBookingStatus('${r.id}','cancelled')" class="btn-reject">Отклонить</button>
                                            </div>
                                        ` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        ` : '<div class="requests-block" style="color:var(--text-muted);">Нет запросов</div>'}
                    </div>
                `;
            }).join('');
        }

        // Переключение вкладок
        let tabs = document.querySelectorAll('.type-tab');
        tabs.forEach(t => {
            t.onclick = () => {
                tabs.forEach(tt => tt.classList.remove('active'));
                t.classList.add('active');
                if (t.dataset.type === 'rentals') {
                    document.getElementById('rentalsContainer').style.display = 'block';
                    document.getElementById('myItemsContainer').style.display = 'none';
                    loadRentals();
                } else {
                    document.getElementById('rentalsContainer').style.display = 'none';
                    document.getElementById('myItemsContainer').style.display = 'block';
                    loadMyItems();
                }
            };
        });

        // Обновление навигации
        function updateBookingsNav() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const loginBtn = document.getElementById('loginBtn');
            const userMenu = document.getElementById('userMenu');
            const userNameSpan = document.getElementById('userName');
            
            if (currentUser) {
                if (loginBtn) loginBtn.classList.add('hidden');
                if (userMenu) {
                    userMenu.classList.remove('hidden');
                    if (userNameSpan) userNameSpan.textContent = currentUser.name;
                }
            } else {
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (userMenu) userMenu.classList.add('hidden');
            }
        }

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });

        // Запуск
        document.addEventListener('DOMContentLoaded', () => {
            updateBookingsNav();
            loadRentals();
        });
    </script>
</body>
</html>
