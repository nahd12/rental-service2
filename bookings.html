<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои бронирования | OneTime</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }
        .booking-type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .type-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .type-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -1px;
        }
        
        /* Карточка товара - компактная */
        .item-card-compact {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .item-main {
            display: flex;
            gap: 16px;
            padding: 16px;
            flex-wrap: wrap;
        }
        .item-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .item-info {
            flex: 2;
            min-width: 180px;
        }
        .item-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .item-price {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 4px;
        }
        .item-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-edit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .btn-delete {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }
        
        /* Блок запросов - компактный */
        .requests-section {
            background: var(--gray);
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }
        .requests-title {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }
        .request-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .request-row:last-child {
            border-bottom: none;
        }
        .request-user {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text);
        }
        .request-dates {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .request-price {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 500;
        }
        .request-status {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 500;
        }
        .status-pending { background: #f59e0b; color: white; }
        .status-confirmed { background: #10b981; color: white; }
        .status-completed { background: #6b7280; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        
        .request-actions {
            display: flex;
            gap: 8px;
        }
        .btn-confirm {
            background: #10b981;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .btn-reject {
            background: #ef4444;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
        }
        
        .badge-count {
            background: var(--primary);
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        .text-center { text-align: center; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* Модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-container {
            background: var(--card-bg);
            border-radius: 20px;
            width: 90%;
            max-width: 480px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0;
        }
        .modal-close:hover {
            color: var(--danger);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            background: var(--gray);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
        }
        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-cancel-modal {
            background: var(--gray);
            color: var(--text);
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .edit-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
            background: var(--gray);
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt"></i>
                <span>One<span class="accent">Time</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="create-listing.html">Сдать вещь</a>
                <a href="bookings.html" class="active">Мои бронирования</a>
            </div>
            <div class="nav-user" id="navUser">
                <a href="login.html" class="btn btn-outline" id="loginBtn">Войти</a>
                <div class="user-menu hidden" id="userMenu">
                    <img src="https://ui-avatars.com/api/?background=7c3aed&color=fff&bold=true" style="width: 36px; height: 36px; border-radius: 50%;">
                    <span id="userName"></span>
                    <div class="dropdown">
                        <a href="profile.html">Профиль</a>
                        <a href="bookings.html">Бронирования</a>
                        <a href="#" id="logoutBtn">Выйти</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <h1>Мои бронирования</h1>
                <p>Управление арендой и вашими товарами</p>
            </div>
        </div>

        <section style="padding: 40px 0;">
            <div class="container">
                <div class="booking-type-tabs">
                    <button class="type-tab active" data-type="rentals">Мои аренды</button>
                    <button class="type-tab" data-type="my-items">Мои вещи</button>
                </div>
                <div id="rentalsContainer"></div>
                <div id="myItemsContainer" style="display: none;"></div>
            </div>
        </section>
    </main>

    <div id="editModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3>Редактирование товара</h3>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="editTitle" class="form-control">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="editCategory" class="form-control">
                        <option value="tools">Инструменты</option>
                        <option value="clothing">Одежда</option>
                        <option value="outdoor">Отдых</option>
                        <option value="electronics">Электроника</option>
                        <option value="sports">Спорт</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Цена за день (₽)</label>
                    <input type="number" id="editPrice" class="form-control">
                </div>
                <div class="form-group">
                    <label>Залог (₽)</label>
                    <input type="number" id="editDeposit" class="form-control">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="editDescription" rows="3" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label>Фото</label>
                    <input type="file" id="editImage" accept="image/*">
                    <img id="editImagePreview" class="edit-preview">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel-modal" onclick="closeEditModal()">Отмена</button>
                <button class="btn-save" onclick="saveEditItem()">Сохранить</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">OneTime</a>
                    <p>OneTime — сервис аренды вещей на один раз.</p>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let currentEditItemId = null;

        function formatDate(d) {
            if (!d) return '—';
            let date = new Date(d);
            return isNaN(date.getTime()) ? '—' : date.toLocaleDateString('ru-RU');
        }

        function getStatusText(s) {
            return { pending:'Ожидает', confirmed:'Подтверждена', completed:'Завершена', cancelled:'Отменена' }[s] || s;
        }

        function showNotification(m, t) {
            let n = document.createElement('div');
            n.textContent = m;
            n.style.cssText = `position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:10px;background:${t==='success'?'#10b981':'#ef4444'};color:white;z-index:10000;font-size:0.85rem;`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2500);
        }

        function updateBookingStatus(id, status) {
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let idx = bookings.findIndex(b => b.id === id);
            if (idx !== -1) {
                bookings[idx].status = status;
                localStorage.setItem('bookings', JSON.stringify(bookings));
                showNotification('Статус изменен', 'success');
                loadRentals();
                loadMyItems();
            }
        }

        function deleteItem(id) {
            if (!confirm('Удалить этот товар?')) return;
            let items = JSON.parse(localStorage.getItem('items')) || [];
            items = items.filter(i => i.id !== id);
            localStorage.setItem('items', JSON.stringify(items));
            showNotification('Товар удален', 'success');
            loadMyItems();
        }

        function openEditModal(itemId) {
            let items = JSON.parse(localStorage.getItem('items')) || [];
            let item = items.find(i => i.id === itemId);
            if (!item) return;
            currentEditItemId = itemId;
            document.getElementById('editTitle').value = item.title || '';
            document.getElementById('editCategory').value = item.category || 'tools';
            document.getElementById('editPrice').value = item.priceDay || 0;
            document.getElementById('editDeposit').value = item.deposit || 0;
            document.getElementById('editDescription').value = item.description || '';
            document.getElementById('editImagePreview').src = item.image || '';
            document.getElementById('editModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.body.style.overflow = '';
            currentEditItemId = null;
        }

        function saveEditItem() {
            let items = JSON.parse(localStorage.getItem('items')) || [];
            let idx = items.findIndex(i => i.id === currentEditItemId);
            if (idx === -1) { showNotification('Товар не найден', 'error'); closeEditModal(); return; }
            
            let updated = { ...items[idx],
                title: document.getElementById('editTitle').value,
                category: document.getElementById('editCategory').value,
                priceDay: parseInt(document.getElementById('editPrice').value),
                deposit: parseInt(document.getElementById('editDeposit').value),
                description: document.getElementById('editDescription').value
            };
            
            let imgFile = document.getElementById('editImage').files[0];
            function save(img) {
                if (img) updated.image = img;
                items[idx] = updated;
                localStorage.setItem('items', JSON.stringify(items));
                showNotification('Товар обновлен', 'success');
                closeEditModal();
                loadMyItems();
            }
            if (imgFile) {
                let reader = new FileReader();
                reader.onload = e => save(e.target.result);
                reader.readAsDataURL(imgFile);
            } else { save(null); }
        }

        document.getElementById('editImage').addEventListener('change', function(e) {
            let f = e.target.files[0];
            if (f) {
                let reader = new FileReader();
                reader.onload = ev => document.getElementById('editImagePreview').src = ev.target.result;
                reader.readAsDataURL(f);
            }
        });

        function loadRentals() {
            let c = document.getElementById('rentalsContainer');
            if (!c) return;
            let user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { c.innerHTML = '<div class="empty-state">Войдите в аккаунт</div>'; return; }
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let my = bookings.filter(b => b.renterId === user.id);
            if (!my.length) { c.innerHTML = '<div class="empty-state">Нет активных аренд</div>'; return; }
            c.innerHTML = my.map(b => `
                <div class="item-card-compact">
                    <div class="item-main">
                        <img src="${b.itemImage || ''}" class="item-img" onerror="this.src='https://placehold.co/80x80'">
                        <div class="item-info">
                            <div class="item-title">${b.itemTitle || 'Без названия'}</div>
                            <div class="item-price">${b.totalPrice || 0} ₽ | Залог: ${b.deposit || 0} ₽</div>
                            <div class="item-desc">${formatDate(b.startDate)} — ${formatDate(b.endDate)} (${b.days || 1} дн.)</div>
                        </div>
                        <div class="item-actions">
                            <span class="request-status status-${b.status}">${getStatusText(b.status)}</span>
                            <a href="item-details.html?id=${b.itemId}" class="btn-edit" style="text-decoration:none;">Подробнее</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadMyItems() {
            let c = document.getElementById('myItemsContainer');
            if (!c) return;
            let user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { c.innerHTML = '<div class="empty-state">Войдите в аккаунт</div>'; return; }
            let items = JSON.parse(localStorage.getItem('items')) || [];
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let my = items.filter(i => i.ownerId === user.id);
            if (!my.length) { c.innerHTML = '<div class="empty-state">У вас пока нет товаров.<br><a href="create-listing.html" class="btn btn-primary" style="margin-top:12px;">Создать объявление</a></div>'; return; }
            
            c.innerHTML = my.map(item => {
                let reqs = bookings.filter(b => b.itemId === item.id);
                return `
                    <div class="item-card-compact">
                        <div class="item-main">
                            <img src="${item.image || ''}" class="item-img" onerror="this.src='https://placehold.co/80x80'">
                            <div class="item-info">
                                <div class="item-title">${item.title || 'Без названия'}</div>
                                <div class="item-price">${item.priceDay || 0} ₽/день | Залог: ${item.deposit || 0} ₽</div>
                                <div class="item-desc">${(item.description || '').substring(0, 60)}...</div>
                            </div>
                            <div class="item-actions">
                                <button onclick="openEditModal('${item.id}')" class="btn-edit">Редактировать</button>
                                <button onclick="deleteItem('${item.id}')" class="btn-delete">Удалить</button>
                            </div>
                        </div>
                        ${reqs.length ? `
                            <div class="requests-section">
                                <div class="requests-title">Запросы на аренду (${reqs.length})</div>
                                ${reqs.map(r => `
                                    <div class="request-row">
                                        <div>
                                            <span class="request-user">${r.renterName || 'Пользователь'}</span>
                                            <span class="request-dates"> ${formatDate(r.startDate)} — ${formatDate(r.endDate)}</span>
                                        </div>
                                        <div class="request-price">${r.totalPrice || 0} ₽</div>
                                        <div>
                                            <span class="request-status status-${r.status}">${getStatusText(r.status)}</span>
                                        </div>
                                        ${r.status === 'pending' ? `
                                            <div class="request-actions">
                                                <button onclick="updateBookingStatus('${r.id}','confirmed')" class="btn-confirm">✓</button>
                                                <button onclick="updateBookingStatus('${r.id}','cancelled')" class="btn-reject">✗</button>
                                            </div>
                                        ` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        ` : '<div class="requests-section" style="color:var(--text-muted); font-size:0.75rem;">Нет запросов</div>'}
                    </div>
                `;
            }).join('');
        }

        document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('editModal').classList.contains('active')) closeEditModal(); });

        let tabs = document.querySelectorAll('.type-tab');
        tabs.forEach(t => {
            t.onclick = () => {
                tabs.forEach(tt => tt.classList.remove('active'));
                t.classList.add('active');
                if (t.dataset.type === 'rentals') {
                    document.getElementById('rentalsContainer').style.display = 'block';
                    document.getElementById('myItemsContainer').style.display = 'none';
                    loadRentals();
                } else {
                    document.getElementById('rentalsContainer').style.display = 'none';
                    document.getElementById('myItemsContainer').style.display = 'block';
                    loadMyItems();
                }
            };
        });

        document.addEventListener('DOMContentLoaded', () => {
            let user = JSON.parse(localStorage.getItem('currentUser'));
            let btn = document.getElementById('loginBtn');
            let menu = document.getElementById('userMenu');
            let nameSpan = document.getElementById('userName');
            if (user) {
                if (btn) btn.classList.add('hidden');
                if (menu) menu.classList.remove('hidden');
                if (nameSpan) nameSpan.textContent = user.name;
            }
            document.getElementById('logoutBtn')?.addEventListener('click', e => { e.preventDefault(); localStorage.removeItem('currentUser'); location.href = 'index.html'; });
            loadRentals();
        });
    </script>
</body>
</html>
