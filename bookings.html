<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои бронирования | OneTime</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .booking-type-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }
        .type-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
        }
        .type-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .booking-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .booking-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-pending { background: #f59e0b; color: white; }
        .status-confirmed { background: #10b981; color: white; }
        .status-completed { background: #6b7280; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        .edit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .delete-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-confirm {
            background: #10b981;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .btn-reject {
            background: #ef4444;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .requests-block {
            margin-top: 16px;
            padding: 16px;
            background: var(--gray);
            border-radius: 12px;
        }
        .request-item {
            padding: 12px;
            background: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .item-info-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .item-thumb {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
        }
        .text-center { text-align: center; }
        .mt-4 { margin-top: 12px; }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt"></i>
                <span>One<span class="accent">Time</span></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="create-listing.html">Сдать вещь</a>
                <a href="bookings.html" class="active">Мои бронирования</a>
            </div>
            <div class="nav-user" id="navUser">
                <a href="login.html" class="btn btn-outline" id="loginBtn">Войти</a>
                <div class="user-menu hidden" id="userMenu">
                    <img src="https://ui-avatars.com/api/?background=7c3aed&color=fff&bold=true" class="avatar" style="width: 40px; height: 40px; border-radius: 50%;">
                    <span id="userName"></span>
                    <div class="dropdown">
                        <a href="profile.html">Профиль</a>
                        <a href="bookings.html">Бронирования</a>
                        <a href="#" id="logoutBtn">Выйти</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <h1>Мои бронирования</h1>
                <p>Управление арендой и вашими товарами</p>
            </div>
        </div>

        <section class="bookings-section">
            <div class="container">
                <div class="booking-type-tabs">
                    <button class="type-tab active" data-type="rentals">Мои аренды</button>
                    <button class="type-tab" data-type="my-items">Мои вещи</button>
                </div>
                <div id="rentalsContainer"></div>
                <div id="myItemsContainer" style="display: none;"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">OneTime</a>
                    <p>OneTime — сервис аренды вещей на один раз.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        let currentEditItemId = null;

        function formatDate(d) { if (!d) return '—'; let date = new Date(d); return isNaN(date.getTime()) ? '—' : date.toLocaleDateString('ru-RU'); }
        function getStatusText(s) { return { pending:'Ожидает', confirmed:'Подтверждена', completed:'Завершена', cancelled:'Отменена' }[s] || s; }
        
        function showNotification(m, t) {
            let n = document.createElement('div');
            n.textContent = m;
            n.style.cssText = `position:fixed;bottom:20px;right:20px;padding:12px 24px;border-radius:12px;background:${t==='success'?'#10b981':'#ef4444'};color:white;z-index:10000;`;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function updateBookingStatus(id, status) {
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let idx = bookings.findIndex(b => b.id === id);
            if (idx !== -1) { bookings[idx].status = status; localStorage.setItem('bookings', JSON.stringify(bookings)); showNotification('Статус изменен', 'success'); loadRentals(); loadMyItems(); }
        }

        function deleteItem(id) {
            if (!confirm('Удалить товар?')) return;
            let items = JSON.parse(localStorage.getItem('items')) || [];
            items = items.filter(i => i.id !== id);
            localStorage.setItem('items', JSON.stringify(items));
            showNotification('Товар удален', 'success');
            loadMyItems();
        }

        function loadRentals() {
            let c = document.getElementById('rentalsContainer');
            if (!c) return;
            let user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { c.innerHTML = '<div class="text-center" style="padding:40px;">Войдите в аккаунт</div>'; return; }
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let my = bookings.filter(b => b.renterId === user.id);
            if (!my.length) { c.innerHTML = '<div class="text-center" style="padding:40px;">Нет аренд</div>'; return; }
            c.innerHTML = my.map(b => `
                <div class="booking-card">
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;">
                        <div style="display:flex;gap:16px;">
                            <img src="${b.itemImage || ''}" style="width:70px;height:70px;object-fit:cover;border-radius:12px;">
                            <div><h4>${b.itemTitle || 'Без названия'}</h4>
                            <p>${formatDate(b.startDate)} — ${formatDate(b.endDate)} (${b.days || 1} дн.)</p>
                            <p>Сумма: ${b.totalPrice || 0} ₽ | Залог: ${b.deposit || 0} ₽</p>
                            <span class="booking-status status-${b.status}">${getStatusText(b.status)}</span></div>
                        </div>
                        <div><a href="item-details.html?id=${b.itemId}" class="edit-btn" style="text-decoration:none;">Подробнее</a></div>
                    </div>
                </div>`).join('');
        }

        function loadMyItems() {
            let c = document.getElementById('myItemsContainer');
            if (!c) return;
            let user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { c.innerHTML = '<div class="text-center" style="padding:40px;">Войдите в аккаунт</div>'; return; }
            let items = JSON.parse(localStorage.getItem('items')) || [];
            let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            let my = items.filter(i => i.ownerId === user.id);
            if (!my.length) { c.innerHTML = '<div class="text-center" style="padding:40px;">Нет товаров. <a href="create-listing.html">Создать</a></div>'; return; }
            c.innerHTML = my.map(item => {
                let reqs = bookings.filter(b => b.itemId === item.id);
                return `<div class="booking-card">
                    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px;">
                        <div style="display:flex;gap:16px;">
                            <img src="${item.image || ''}" style="width:70px;height:70px;object-fit:cover;border-radius:12px;">
                            <div><h4>${item.title || 'Без названия'}</h4>
                            <p>${item.priceDay || 0} ₽/день | Залог: ${item.deposit || 0} ₽</p>
                            <p>${(item.description || '').substring(0, 80)}...</p></div>
                        </div>
                        <div><button onclick="openEditModal('${item.id}')" class="edit-btn">Ред.</button>
                        <button onclick="deleteItem('${item.id}')" class="delete-btn">Удалить</button></div>
                    </div>
                    ${reqs.length ? `<div class="requests-block"><strong>Запросы (${reqs.length})</strong>${reqs.map(r => `<div class="request-item"><strong>${r.renterName || 'Пользователь'}</strong> ${formatDate(r.startDate)}—${formatDate(r.endDate)}<br>Сумма: ${r.totalPrice || 0} ₽<br><span class="booking-status status-${r.status}">${getStatusText(r.status)}</span>${r.status === 'pending' ? `<div class="mt-4"><button onclick="updateBookingStatus('${r.id}','confirmed')" class="btn-confirm">Подтвердить</button> <button onclick="updateBookingStatus('${r.id}','cancelled')" class="btn-reject">Отклонить</button></div>` : ''}</div>`).join('')}</div>` : '<div class="no-requests" style="margin-top:12px;">Нет запросов</div>'}
                </div>`;
            }).join('');
        }

        function openEditModal(id) {
            let items = JSON.parse(localStorage.getItem('items')) || [];
            let item = items.find(i => i.id === id);
            if (!item) return;
            let newTitle = prompt('Новое название:', item.title);
            if (newTitle) item.title = newTitle;
            let newPrice = prompt('Новая цена (₽/день):', item.priceDay);
            if (newPrice) item.priceDay = parseInt(newPrice);
            let newDeposit = prompt('Новый залог (₽):', item.deposit);
            if (newDeposit) item.deposit = parseInt(newDeposit);
            let newDesc = prompt('Новое описание:', item.description);
            if (newDesc) item.description = newDesc;
            localStorage.setItem('items', JSON.stringify(items));
            showNotification('Товар обновлен', 'success');
            loadMyItems();
        }

        let tabs = document.querySelectorAll('.type-tab');
        tabs.forEach(t => {
            t.onclick = () => {
                tabs.forEach(tt => { tt.classList.remove('active'); tt.style.borderBottom = 'none'; });
                t.classList.add('active'); t.style.borderBottom = '2px solid var(--primary)';
                if (t.dataset.type === 'rentals') { document.getElementById('rentalsContainer').style.display = 'block'; document.getElementById('myItemsContainer').style.display = 'none'; loadRentals(); }
                else { document.getElementById('rentalsContainer').style.display = 'none'; document.getElementById('myItemsContainer').style.display = 'block'; loadMyItems(); }
            };
        });

        document.addEventListener('DOMContentLoaded', () => {
            let user = JSON.parse(localStorage.getItem('currentUser'));
            let btn = document.getElementById('loginBtn');
            let menu = document.getElementById('userMenu');
            let nameSpan = document.getElementById('userName');
            if (user) { if(btn) btn.classList.add('hidden'); if(menu) menu.classList.remove('hidden'); if(nameSpan) nameSpan.textContent = user.name; }
            document.getElementById('logoutBtn')?.addEventListener('click', (e) => { e.preventDefault(); localStorage.removeItem('currentUser'); location.href='index.html'; });
            loadRentals();
        });
    </script>
</body>
</html>
